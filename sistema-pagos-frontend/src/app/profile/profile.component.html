<div class="container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>
        Perfil de {{ getRolPrincipal() }}
      </mat-card-title>
    </mat-card-header>
    <mat-divider></mat-divider>
    <mat-card-content>
      <p><strong>Nombre de usuario:</strong> {{ username }}</p>
      <p><strong>Código de estudiante:</strong> {{ codigoEstudiante }}</p>
      <p><strong>Roles:</strong> {{ roles.join(', ') }}</p>
    </mat-card-content>
  </mat-card>
</div>
